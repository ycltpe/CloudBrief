services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcd_data:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9003:9001"
      - "9002:9000"
    volumes:
      - minio_data:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.3.21
    command: ["milvus", "run", "standalone"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19531:19530"
      - "9092:9091"
    depends_on:
      - etcd
      - minio

  redis:
    container_name: cloudbrief-redis
    image: redis:7-alpine
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  mysql:
    container_name: cloudbrief-mysql
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: cloudbrief_root
      MYSQL_DATABASE: cloudbrief
      MYSQL_USER: cloudbrief
      MYSQL_PASSWORD: cloudbrief
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  vllm-reranker:
    container_name: cloudbrief-vllm-reranker
    # Mac M5 无 NVIDIA GPU，且 vLLM 官方 CPU 镜像对 arm64 / score 任务支持不完善，
    # 改用基于 sentence-transformers CrossEncoder 的轻量本地 reranker 服务，
    # 与后端 LocalReranker 约定一致的 Cohere-compatible /rerank 端点。
    build:
      context: ./reranker
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8008:8000"
    environment:
      - RERANK_MODEL=BAAI/bge-reranker-large
      - HF_HUB_ENABLE_HF_TRANSFER=0
      - SENTENCE_TRANSFORMERS_HOME=/root/.cache/sentence_transformers
      - HF_HOME=/root/.cache/huggingface
    volumes:
      - vllm_model_cache:/root/.cache
    deploy:
      resources:
        limits:
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  neo4j:
    container_name: cloudbrief-neo4j
    image: neo4j:5-community
    ports:
      - "7687:7687"
      - "7474:7474"
    environment:
      NEO4J_AUTH: neo4j/cloudbrief
      NEO4J_PLUGINS: '[]'
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p cloudbrief 'RETURN 1;'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  etcd_data:
  minio_data:
  milvus_data:
  redis_data:
  mysql_data:
  vllm_model_cache:
  neo4j_data:
  neo4j_logs:
